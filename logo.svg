<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDB600"/>
      <stop offset="100%" stop-color="#FFCF3F"/>
    </linearGradient>
    <filter id="gw">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tgw">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: hexagon chip (44x44, centered vertically at y=6) -->
  <g transform="translate(4,4)">
    <polygon points="24,3 40,12 40,32 24,41 8,32 8,12"
             fill="rgba(18,14,0,0.97)" stroke="url(#lg)" stroke-width="2" filter="url(#gw)"/>
    <rect x="15" y="17" width="18" height="12" rx="2.5"
          fill="rgba(35,28,0,0.92)" stroke="url(#lg)" stroke-width="1.4"/>
    <circle cx="24" cy="23" r="4" fill="url(#lg)" filter="url(#gw)"/>
    <circle cx="24" cy="23" r="1.6" fill="rgba(248,215,255,1)"/>
    <!-- pins -->
    <line x1="24" y1="17" x2="24" y2="9"  stroke="url(#lg)" stroke-width="1.4"/>
    <circle cx="24" cy="8" r="2" fill="#EDB600"/>
    <line x1="33" y1="23" x2="40" y2="23" stroke="url(#lg)" stroke-width="1.4"/>
    <circle cx="41" cy="23" r="2" fill="#FFCF3F"/>
    <line x1="24" y1="29" x2="24" y2="37" stroke="url(#lg)" stroke-width="1.4"/>
    <circle cx="24" cy="38" r="2" fill="#EDB600"/>
    <line x1="15" y1="23" x2="8" y2="23"  stroke="url(#lg)" stroke-width="1.4"/>
    <circle cx="7"  cy="23" r="2" fill="#FFCF3F"/>
  </g>

  <!-- Separator line -->
  <line x1="58" y1="10" x2="58" y2="46" stroke="url(#lg)" stroke-width="1.2" opacity="0.7"/>

  <!-- Text: HYPERGEE + RPC -->
  <text x="70" y="37" font-family="Orbitron, Arial Black, sans-serif" font-size="22" font-weight="900" letter-spacing="1" filter="url(#tgw)">
    <tspan fill="#ffffff">HYPERGEE</tspan><tspan fill="url(#lg)">RPC</tspan>
  </text>
</svg>
